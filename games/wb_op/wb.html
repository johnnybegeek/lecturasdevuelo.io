<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worldbuilding Manager</title>
    <link rel="stylesheet" href="wb.min.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Saltar al contenido</a>
    
    <div class="app-container">
        <header>
            <div class="header-content">
                <div class="header-top">
                    <h1>Cosmogonía Manager</h1>
                    <div class="header-actions">
                        <button id="exportBtn" class="btn btn-success" aria-label="Exportar datos">
                            <span>📥 Exportar</span>
                        </button>
                        <button id="importBtn" class="btn btn-warning" aria-label="Importar datos">
                            <span>📤 Importar</span>
                        </button>
                        <input type="file" id="fileInput" accept=".json" style="display:none;" aria-label="Seleccionar archivo">
                        <button id="resetBtn" class="btn btn-danger" aria-label="Restablecer datos">
                            <span>🔄 Reset</span>
                        </button>
                    </div>
                </div>
                <div class="concept-input-container">
                    <label for="conceptInput">Concepto:</label>
                    <input type="text" id="conceptInput" placeholder="Nombre de tu mundo..." aria-label="Nombre del concepto">
                </div>
            </div>
        </header>
        
        <main id="main-content">
            <div class="categories-grid" id="categoriesGrid"></div>
        </main>
    </div>
    
    <div class="toast-container" id="toastContainer" aria-live="polite"></div>
    
    <script src="wb.js"></script>
</body>
</html>
