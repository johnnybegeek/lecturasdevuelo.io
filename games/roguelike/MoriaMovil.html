<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MoriaMovil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: "Courier New", monospace;
        }

        body {
            display: flex;
            flex-direction: column;
            background-color: #000;
            color: #fff;
        }

        /* Cuarto superior (25% alto) */
        .header-section {
            height: 25vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000;
            padding: 10px;
            text-align: center;
        }

        .header-section h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .header-section a {
            color: #1E90FF;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .header-section a:hover {
            text-decoration: underline;
        }

        /* Dos cuartos centrales (50% alto) - Tablero de juego */
        .game-section {
            height: 50vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
            touch-action: none;
            overflow: hidden;
        }

        #game {
            font-size: 1.8vw;
            line-height: 1.5;
            white-space: pre;
            background-color: #111;
            padding: 10px;
            border: 1px solid #333;
            user-select: none;
            -webkit-user-select: none;
        }

        @media (max-width: 768px) {
            #game {
                font-size: 3.5vw;
            }
        }

        @media (max-width: 480px) {
            #game {
                font-size: 4.5vw;
            }
        }

        .wall { color: #555; }
        .floor { color: #888; }
        .player { color: #0f0; font-weight: bold; }
        .exit { color: #f00; font-weight: bold; }

        .cell {
            display: inline-block;
            min-width: 1em;
            text-align: center;
        }

        /* Cuarto inferior (25% alto) */
        .footer-section {
            height: 25vh;
            background-color: #1E90FF;
        }

        /* Modal de victoria */
        .victory-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #1a1a1a;
            color: #fff;
            padding: 20px;
            border: 2px solid #0f0;
            border-radius: 8px;
            text-align: center;
            z-index: 1000;
            max-width: 80%;
            display: none;
        }

        .victory-modal h2 {
            color: #0f0;
            margin-top: 0;
        }

        .victory-modal p {
            margin-bottom: 15px;
        }

        .victory-modal button {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        .victory-modal button:active {
            background-color: #0a0;
        }
    </style>
</head>
<body>
    <!-- Cuarto superior: Nombre del juego + enlace a index.html -->
    <div class="header-section">
        <h1>MoriaMovil</h1>
        <a href="/index.html" target="_blank">Volver a Inicio</a>
    </div>

    <!-- Dos cuartos centrales: Tablero de juego -->
    <div class="game-section" id="game-container">
        <div id="game" role="application" aria-label="Mapa del juego. Usa swipes para moverte."></div>
    </div>

    <!-- Cuarto inferior: Vacío, fondo #1E90FF -->
    <div class="footer-section"></div>

    <!-- Modal de victoria -->
    <div id="victory-modal" class="victory-modal" role="alertdialog" aria-labelledby="victory-title" aria-modal="true">
        <h2 id="victory-title">¡Nivel Completado!</h2>
        <p>Has encontrado la salida. ¿Quieres jugar de nuevo?</p>
        <button id="continue-btn" autofocus>Continuar</button>
    </div>

    <script>
        const WIDTH = 15;
        const HEIGHT = 10;
        let playerX = 1;
        let playerY = 1;
        let map = [];
        let exitX = 0;
        let exitY = 0;
        let touchStartX = 0;
        let touchStartY = 0;

        const gameElement = document.getElementById('game');
        const gameContainer = document.getElementById('game-container');
        const victoryModal = document.getElementById('victory-modal');
        const continueBtn = document.getElementById('continue-btn');

        function initMap() {
            map = [];
            for (let y = 0; y < HEIGHT; y++) {
                map[y] = [];
                for (let x = 0; x < WIDTH; x++) {
                    if (y === 0 || y === HEIGHT - 1 || x === 0 || x === WIDTH - 1) {
                        map[y][x] = '#';
                    } else if (Math.random() < 0.2) {
                        map[y][x] = '#';
                    } else {
                        map[y][x] = '.';
                    }
                }
            }

            do {
                exitX = Math.floor(Math.random() * (WIDTH - 2)) + 1;
                exitY = Math.floor(Math.random() * (HEIGHT - 2)) + 1;
            } while (exitX === playerX && exitY === playerY);

            map[exitY][exitX] = '>';
            map[playerY][playerX] = '@';
            drawMap();
        }

        function drawMap() {
            let rows = [];
            for (let y = 0; y < HEIGHT; y++) {
                let row = [];
                for (let x = 0; x < WIDTH; x++) {
                    let cell = map[y][x];
                    let className = '';
                    switch (cell) {
                        case '#': className = 'wall'; break;
                        case '.': className = 'floor'; break;
                        case '@': className = 'player'; break;
                        case '>': className = 'exit'; break;
                    }
                    row.push(`<span class="cell ${className}">${cell}</span>`);
                }
                rows.push(row.join(''));
            }
            gameElement.innerHTML = rows.join('<br>');
        }

        function movePlayer(dx, dy) {
            const newX = playerX + dx;
            const newY = playerY + dy;
            if (map[newY] && map[newY][newX]) {
                if (map[newY][newX] === '>') {
                    victoryModal.style.display = 'block';
                    continueBtn.focus();
                } else if (map[newY][newX] !== '#') {
                    map[playerY][playerX] = '.';
                    playerX = newX;
                    playerY = newY;
                    map[playerY][playerX] = '@';
                    drawMap();
                }
            }
        }

        // Controles por swipe para móvil
        gameContainer.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        gameContainer.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (!touchStartX || !touchStartY) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const diffX = touchStartX - touchEndX;
            const diffY = touchStartY - touchEndY;

            // Umbral mínimo para considerar un swipe
            const threshold = 20;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Movimiento horizontal
                if (diffX > threshold) {
                    movePlayer(1, 0); // Derecha
                } else if (diffX < -threshold) {
                    movePlayer(-1, 0); // Izquierda
                }
            } else {
                // Movimiento vertical
                if (diffY > threshold) {
                    movePlayer(0, 1); // Abajo
                } else if (diffY < -threshold) {
                    movePlayer(0, -1); // Arriba
                }
            }

            touchStartX = 0;
            touchStartY = 0;
        }, { passive: false });

        // Controles por teclado para depuración/escritorio
        document.addEventListener('keydown', (e) => {
            const keys = {
                'ArrowUp': [0, -1], 'w': [0, -1], 'W': [0, -1],
                'ArrowDown': [0, 1], 's': [0, 1], 'S': [0, 1],
                'ArrowLeft': [-1, 0], 'a': [-1, 0], 'A': [-1, 0],
                'ArrowRight': [1, 0], 'd': [1, 0], 'D': [1, 0]
            };
            if (e.key in keys) {
                e.preventDefault();
                const [dx, dy] = keys[e.key];
                movePlayer(dx, dy);
            }
            if (e.key === 'Escape' && victoryModal.style.display === 'block') {
                victoryModal.style.display = 'none';
                initMap();
            }
        });

        continueBtn.addEventListener('click', () => {
            victoryModal.style.display = 'none';
            initMap();
        });

        continueBtn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                victoryModal.style.display = 'none';
                initMap();
            }
        });

        // Inicializar el juego
        initMap();
    </script>
</body>
</html>
