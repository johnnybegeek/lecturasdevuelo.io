<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Metadatos de la página -->
    <title>Lecturas de Vuelo: Departures</title> <!-- Título de la página que aparece en la pestaña del navegador -->
    <meta charset="utf-8"> <!-- Define la codificación de caracteres para la página -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configura la vista para dispositivos móviles -->
    <link rel="stylesheet" href="../css/estilo.css"> <!-- Enlace al archivo de estilos CSS -->
</head>

<body>
    <!-- Cabecera con logotipo y título -->
    <div class="logo-header">
        <a href="/index.html"><img src="../paginas/imagenes/logoblog.avif" alt="Logotipo de Lecturas de Vuelo" class="logo-img"></a> <!-- Logotipo del sitio -->
        <h1>Juegos</h1> <!-- Título principal de esta página -->
    </div>
    <p>Lecturas de vuelo: Artículos a baja altitud</p> <!-- Título de la web + Eslogan del sitio -->

    <!-- Barra de navegación superior fija -->
    <header class="header-fijo">
        <nav class="menu-principal">
            <!-- Lista de enlaces de navegación (se oculta en móvil) -->
            <ul>
                <li><a href="/paginas/departures.html">Departures</a></li>
                <li><a href="/paginas/arrivals.html">Arrivals</a></li>
                <li><a href="/paginas/navdata.html">NavData</a></li>
                <li><a href="/paginas/hub.html">Hub</a></li>
                <li><a href="/paginas/pruebas.html">Who</a></li>
            </ul>
            <!-- Botones de control: tema y menú hamburguesa (siempre visibles) -->
            <button class="menu-toggle" aria-label="Abrir menú">☰</button>
            <button id="theme-toggle" aria-label="Alternar entre modo día y noche" aria-pressed="false"><span aria-hidden="true">🌙</span></button>
        </nav>
    </header>

    <!-- callout para resumir la sección -->
    <div class="callout-verde">
        <p> Algunos juegos para que disfrutes desde el navegador.
        <br> Actualizado a: 11/06/2026 <!-- Añade fecha de hoy -->
        </p>
    </div>

    <!-- Contenido principal de la página -->
    <main>
        <br> <!-- Salto de línea para espacio -->
        <h2>Roguelike ASCII</h2>
        <a href="/games/roguelike/roglik1.html">Roguelike ASCII</a>
        <br>
        <h2>Maravia</h2>
        <a href="/games/Maravia/index.html">Generador de palabras aleatorias</a>
        <br>
    </main>

    <!-- Scripts para la funcionalidad del menú y el tema -->
    <script>
        /* Menú hamburguesa: alterna la visibilidad del menú de enlaces en móvil */
        document.querySelector('.menu-toggle').addEventListener('click', function() {
            document.querySelector('.menu-principal ul').classList.toggle('active');
        });

        /* Botón de tema (día/noche): alterna entre modo claro y oscuro */
        const themeToggle = document.getElementById('theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                /* Cambiar el emoji del botón según el estado del tema */
                const isDark = document.body.classList.contains('dark-mode');
                this.querySelector('span').textContent = isDark ? '☀️' : '🌙';
                /* Actualizar el estado aria-pressed para accesibilidad */
                this.setAttribute('aria-pressed', isDark);
            });
        }
    </script>
</body>
</html>
