<!DOCTYPE html>
<html lang="es">
<head>
    <title>WIP: Work In Progress</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/estilo.css">
</head>

<body>
    <!-- Cabecera con logotipo y título -->
    <div class="logo-header">
        <a href="/index.html" class="img-link"><img src="../paginas/imagenes/logoblog.avif" alt="Logotipo de Lecturas de Vuelo" class="logo-img"></a> <!-- Logotipo del sitio -->
        <h1>WIP: Work In Progress</h1> <!-- Título principal del sitio -->
    </div>
    <p>Lecturas de vuelo</p> <!-- nombre de la web -->

    <!-- Barra de navegación superior fija -->
    <header class="header-fijo">
        <nav class="menu-principal">
            <!-- Lista de enlaces de navegación (se oculta en móvil) -->
            <ul>
                <li><a href="/paginas/departures.html">Departures</a></li>
                <li><a href="/paginas/arrivals.html">Arrivals</a></li>
                <li><a href="/paginas/navdata.html">NavData</a></li>
                <li><a href="/paginas/hub.html">Hub</a></li>
                <li><a href="/paginas/who.html">Who</a></li>
            </ul>
            <!-- Botones de control: tema y menú hamburguesa (siempre visibles) -->
            <button class="menu-toggle" aria-label="Abrir menú">☰</button>
            <button id="theme-toggle" aria-label="Alternar entre modo día y noche" aria-pressed="false"><span aria-hidden="true">🌙</span></button>
        </nav>
    </header>

    <main>
        <p>Aquí encontraréis el roadmap del proceso de como está tomando forma esta web.</p>
        <p>Secciones:</p>
        <ul>
            <li><a href="/index.html" class="img-link">Memoria</a>: Lo realizado hasta el momento.</li>
            <li><a href="/index.html" class="img-link">Roadmap</a>: Futuras implementaciones.</li>
        </ul>
    </main>
    <!-- Scripts para la funcionalidad del menú y el tema -->
    <script>
        /* Menú hamburguesa: alterna la visibilidad del menú de enlaces en móvil */
        document.querySelector('.menu-toggle').addEventListener('click', function() {
            document.querySelector('.menu-principal ul').classList.toggle('active');
        });

        /* Botón de tema (día/noche): alterna entre modo claro y oscuro */
        const themeToggle = document.getElementById('theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                /* Cambiar el emoji del botón según el estado del tema */
                const isDark = document.body.classList.contains('dark-mode');
                this.querySelector('span').textContent = isDark ? '☀️' : '🌙';
                /* Actualizar el estado aria-pressed para accesibilidad */
                this.setAttribute('aria-pressed', isDark);
            });
        }
    </script>
</body>
</html>
