<!DOCTYPE html>
<html lang="es">
<head>
    <title>WIP: Work In Progress</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/estilo.css">
</head>

<body>
    <header class="site-header" role="banner">
        <!-- 1. Identidad de la web (cargada desde includes/header.html) -->
        <div data-include="../includes/header.html"></div>

        <!-- 2. Navegación Principal (cargada desde includes/nav.html) -->
        <div data-include="../includes/nav.html"></div>
    </header>

    <main>
        <p>Aquí encontraréis el roadmap del proceso de como está tomando forma esta web.</p>
        <p>Secciones:</p>
        <ul>
            <li><a href="/index.html">Memoria</a>: Lo realizado hasta el momento.</li>
            <li><a href="/index.html">Roadmap</a>: Futuras implementaciones.</li>
        </ul>
    </main>

    <!-- Footer (cargado desde includes/footer.html) -->
    <div data-include="../includes/footer.html"></div>

    <!-- Scripts para la funcionalidad del menú -->
    <script>
        // Función para cargar includes
        function loadIncludes() {
            const includeElements = document.querySelectorAll('[data-include]');
            includeElements.forEach(async (element) => {
                const filePath = element.getAttribute('data-include');
                try {
                    const response = await fetch(filePath);
                    if (response.ok) {
                        const html = await response.text();
                        element.innerHTML = html;
                        // Re-asignar event listeners después de cargar el HTML
                        initNavListeners();
                    } else {
                        console.error(`Error al cargar ${filePath}: ${response.statusText}`);
                    }
                } catch (error) {
                    console.error(`Error al cargar ${filePath}:`, error);
                }
            });
        }

        // Inicializar listeners de navegación (para el menú y el tema)
        function initNavListeners() {
            // Menú hamburguesa
            const menuToggle = document.querySelector('.menu-toggle');
            if (menuToggle) {
                menuToggle.addEventListener('click', function() {
                    const menu = document.getElementById('main-menu');
                    const isExpanded = this.getAttribute('aria-expanded') === 'true';
                    this.setAttribute('aria-expanded', !isExpanded);
                    menu.classList.toggle('active');
                });
            }

            // Botón de tema
            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', function() {
                    const isPressed = this.getAttribute('aria-pressed') === 'true';
                    this.setAttribute('aria-pressed', !isPressed);
                    document.body.classList.toggle('dark-mode');
                    this.querySelector('span').textContent = !isPressed ? '☀️' : '🌙';
                });
            }

            // Menú footer (si existe)
            const footerToggle = document.querySelector('.footer-menu-toggle');
            if (footerToggle) {
                footerToggle.addEventListener('click', function() {
                    document.querySelector('.menu-footer ul').classList.toggle('active');
                });
            }
        }

        // Cargar includes al iniciar la página
        document.addEventListener('DOMContentLoaded', () => {
            loadIncludes();
        });
    </script>
</body>
</html>
