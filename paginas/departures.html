<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Metadatos de la página -->
    <title>Lecturas de Vuelo: Departures</title> <!-- Título de la página que aparece en la pestaña del navegador -->
    <meta charset="utf-8"> <!-- Define la codificación de caracteres para la página -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configura la vista para dispositivos móviles -->
    <link rel="stylesheet" href="../css/estilo.css"> <!-- Enlace al archivo de estilos CSS -->
</head>

<body>
    <header class="site-header" role="banner">
        <!-- 1. Identidad de la web (cargada desde includes/header.html) -->
        <div data-include="../includes/header.html"></div>

        <!-- 2. Navegación Principal (cargada desde includes/nav.html) -->
        <div data-include="../includes/nav.html"></div>
    </header>

    <!-- callout para resumir la sección -->
    <div class="callout-verde">
        <p> En <strong>Departures</strong> iniciamos el viaje; un espacio para ideas y artículos.
        <br> Actualizado a: 05/06/2026 <!-- Añade fecha de hoy -->
        </p>
    </div>

    <!-- Contenido principal de la página -->
    <main>
        <a href="../departures/paytowin050626.html">El Pay-to-Win en juegos de mesa.</a>
        <br> <!-- Salto de línea para espacio -->
    </main>

    <!-- Footer (cargado desde includes/footer.html) -->
    <div data-include="../includes/footer.html"></div>

    <!-- Scripts para la funcionalidad del menú -->
    <script>
        // Función para cargar includes
        function loadIncludes() {
            const includeElements = document.querySelectorAll('[data-include]');
            includeElements.forEach(async (element) => {
                const filePath = element.getAttribute('data-include');
                try {
                    const response = await fetch(filePath);
                    if (response.ok) {
                        const html = await response.text();
                        element.innerHTML = html;
                        // Re-asignar event listeners después de cargar el HTML
                        initNavListeners();
                    } else {
                        console.error(`Error al cargar ${filePath}: ${response.statusText}`);
                    }
                } catch (error) {
                    console.error(`Error al cargar ${filePath}:`, error);
                }
            });
        }

        // Inicializar listeners de navegación (para el menú y el tema)
        function initNavListeners() {
            // Menú hamburguesa
            const menuToggle = document.querySelector('.menu-toggle');
            if (menuToggle) {
                menuToggle.addEventListener('click', function() {
                    const menu = document.getElementById('main-menu');
                    const isExpanded = this.getAttribute('aria-expanded') === 'true';
                    this.setAttribute('aria-expanded', !isExpanded);
                    menu.classList.toggle('active');
                });
            }

            // Botón de tema
            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', function() {
                    const isPressed = this.getAttribute('aria-pressed') === 'true';
                    this.setAttribute('aria-pressed', !isPressed);
                    document.body.classList.toggle('dark-mode');
                    this.querySelector('span').textContent = !isPressed ? '☀️' : '🌙';
                });
            }

            // Menú footer (si existe)
            const footerToggle = document.querySelector('.footer-menu-toggle');
            if (footerToggle) {
                footerToggle.addEventListener('click', function() {
                    document.querySelector('.menu-footer ul').classList.toggle('active');
                });
            }
        }

        // Cargar includes al iniciar la página
        document.addEventListener('DOMContentLoaded', () => {
            loadIncludes();
        });
    </script>
</body>
</html>
