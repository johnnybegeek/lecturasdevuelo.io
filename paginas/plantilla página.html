<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Metadatos de la página -->
    <title>Lecturas de Vuelo</title> <!-- Título de la página que aparece en la pestaña del navegador -->
    <meta charset="utf-8"> <!-- Define la codificación de caracteres para la página -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configura la vista para dispositivos móviles -->
    <link rel="stylesheet" href="css/estilo.css"> <!-- Enlace al archivo de estilos CSS -->
</head>

<body>
    <!-- Cabecera con logotipo y título -->
    <div class="logo-header">
        <img src="../paginas/imagenes/logoblog.avif" alt="Logotipo de Lecturas de Vuelo" class="logo-img"> <!-- Logotipo del sitio -->

    </div>
    <p>Lecturas de vuelo: Artículos a baja altitud</p> <!-- Título de la web + Eslogan del sitio -->

    <!-- Barra de navegación superior fija -->
    <header class="header-fijo">
        <button class="menu-toggle" aria-label="Abrir menú">☰</button> <!-- Botón del menú hamburguesa para móviles -->
        <nav class="menu-principal">
            <ul>
                <li><a href="/index.html">Home</a></li> <!-- Enlace a la página principal -->
                <li><a href="/paginas/wip.html">Departures</a></li> <!-- Enlace a la sección de proyectos en marcha -->
                <li><a href="/paginas/pruebas.html">Arrivals</a></li> <!-- Enlace a la sección de archivo -->
                <li><a href="/paginas/pruebas.html">NavData</a></li> <!-- Enlace a la sección de recursos -->
                <li><a href="/paginas/pruebas.html">Hub</a></li> <!-- Enlace a Áreas -->
                <li><a href="/paginas/pruebas.html">Gates</a></li> <!-- Enlace ideas breves o blog -->

            </ul>
        </nav>
    </header>

    <!-- callout para resumir la sección -->
    <div class="callout-verde">
        <p> <!-- Añade descripción-->
        <br> Actualizado a: <!-- Añade fecha de hoy -->
        </p>
    </div>

    <!-- Contenido principal de la página -->
    <main>

        <br> <!-- Salto de línea para espacio -->
    </main>

    <!-- Barra de navegación inferior fija -->
    <footer class="footer-fijo">
        <button class="footer-menu-toggle" aria-label="Abrir menú">☰</button> <!-- Botón del menú hamburguesa para móviles en el footer -->

            <ul>
                <li><a href="/paginas/pruebas.html">Quién</a></li> <!-- Enlace a información sobre el autor -->

            </ul>
        </nav>
    </footer>

    <!-- Scripts para la funcionalidad del menú -->
    <script>
        // JavaScript para el menú hamburguesa del header
        document.querySelector('.menu-toggle').addEventListener('click', function() {
            document.querySelector('.menu-principal ul').classList.toggle('active'); // Alterna la clase 'active' para mostrar/ocultar el menú principal
        });

        // JavaScript para el menú hamburguesa del footer
        document.querySelector('.footer-menu-toggle').addEventListener('click', function() {
            document.querySelector('.menu-footer ul').classList.toggle('active'); // Alterna la clase 'active' para mostrar/ocultar el menú del footer
        });
    </script>
</body>
</html>
