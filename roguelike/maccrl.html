<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roguelike ASCII - Mejorado</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: "Courier New", monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }
        #game {
            font-size: 24px;
            line-height: 1;
            white-space: pre;
            background-color: #111;
            padding: 10px;
            border: 1px solid #333;
        }
        .controls {
            margin-top: 20px;
            text-align: center;
            color: #888;
        }
        .wall { color: #555; }
        .floor { color: #888; }
        .player { color: #0f0; }
    </style>
</head>
<body>
    <h1>Roguelike ASCII</h1>
    <p>Usa las teclas de flecha (↑ ↓ ← →) o WASD para moverte.</p>
    <div id="game"></div>
    <div class="controls">
    </div>

    <script>
        const WIDTH = 40;
        const HEIGHT = 20;
        let playerX = 1;
        let playerY = 1;
        let map = [];
        let exitX = 0;
        let exitY = 0;

        function initMap() {
            map = [];
            for (let y = 0; y < HEIGHT; y++) {
                map[y] = [];
                for (let x = 0; x < WIDTH; x++) {
                    if (y === 0 || y === HEIGHT - 1 || x === 0 || x === WIDTH - 1) {
                        map[y][x] = '#';
                    } else if (Math.random() < 0.15) {
                        map[y][x] = '#';
                    } else {
                        map[y][x] = '.';
                    }
                }
            }

            // Colocar salida en posición aleatoria (no en los bordes)
            do {
                exitX = Math.floor(Math.random() * (WIDTH - 2)) + 1;
                exitY = Math.floor(Math.random() * (HEIGHT - 2)) + 1;
            } while (exitX === playerX && exitY === playerY);

            map[exitY][exitX] = '>';
            map[playerY][playerX] = '@';
        }

        function drawMap() {
            let rows = [];
            for (let y = 0; y < HEIGHT; y++) {
                let row = [];
                for (let x = 0; x < WIDTH; x++) {
                    let cell = map[y][x];
                    let className = '';
                    if (cell === '#') className = 'wall';
                    else if (cell === '.') className = 'floor';
                    else if (cell === '@') className = 'player';
                    else if (cell === '>') className = 'exit';
                    row.push(`<span class="${className}">${cell}</span>`);
                }
                rows.push(row.join(''));
            }
            document.getElementById('game').innerHTML = rows.join('<br>');
        }

        function movePlayer(dx, dy) {
            const newX = playerX + dx;
            const newY = playerY + dy;

            if (map[newY] && map[newY][newX]) {
                if (map[newY][newX] === '>') {
                    alert('¡Has encontrado la salida! Nivel completado.');
                    initMap();
                } else if (map[newY][newX] !== '#') {
                    map[playerY][playerX] = '.';
                    playerX = newX;
                    playerY = newY;
                    map[playerY][playerX] = '@';
                    drawMap();
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            const keys = {
                'ArrowUp': [0, -1], 'w': [0, -1], 'W': [0, -1],
                'ArrowDown': [0, 1], 's': [0, 1], 'S': [0, 1],
                'ArrowLeft': [-1, 0], 'a': [-1, 0], 'A': [-1, 0],
                'ArrowRight': [1, 0], 'd': [1, 0], 'D': [1, 0]
            };

            if (e.key in keys) {
                e.preventDefault();
                const [dx, dy] = keys[e.key];
                movePlayer(dx, dy);
            }
        });

        initMap();
        drawMap();
    </script>
</body>
</html>
