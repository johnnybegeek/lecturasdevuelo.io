<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos Manager</title>
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/secundaria.css">
    <link rel="stylesheet" href="/juegos/wb_op/cosmos.css">
</head>
<body>
    
    <!-- Header móvil -->
        <div id="mobileHeaderContainer" data-include="/includes/mobile-header.html"></div>

        <!-- Sidebar escritorio -->
        <div id="sidebarContainer" data-include="/includes/desktop-sidebar.html"></div>

    <!-- Contenido principal -->
    <main class="content">
        <div class="desktop-top-bar" aria-hidden="true"></div>
        <div class="content-wrapper">
            <div class="concept-input-container">
                <label for="conceptInput">Concepto:</label>
                <input type="text" id="conceptInput" placeholder="Nombre de tu mundo..." aria-label="Nombre del concepto">
            </div>
            
            <div class="categories-container" id="categoriesGrid"></div>
        </div>
        <div class="desktop-bottom-bar" aria-hidden="true"></div>
    </main>

    <!-- Logo flotante para móvil -->
    <div id="floatingLogoContainer" data-include="/includes/floating-logo.html"></div>

    <!-- Botones de acciones (móvil: flotante, escritorio: fijos) -->
    <div class="actions-container" id="actionsContainer">
        <div class="actions-buttons" id="actionsButtons">
            <button id="exportBtn" class="btn btn-success" aria-label="Exportar datos">
                <span>📥 Exportar</span>
            </button>
            <button id="importBtn" class="btn btn-warning" aria-label="Importar datos">
                <span>📤 Importar</span>
            </button>
            <input type="file" id="fileInput" accept=".json" style="display:none;" aria-label="Seleccionar archivo">
            <button id="resetBtn" class="btn btn-danger" aria-label="Restablecer datos">
                <span>🔄 Reset</span>
            </button>
        </div>
        <button class="floating-actions-btn" id="floatingActionsBtn" aria-label="Menú de acciones">
            <span>🌍</span>
        </button>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer" aria-live="polite"></div>

    <script src="cosmos.js"></script>

    <!-- Script para cargar componentes comunes con fallback estático -->
    <script src="/assets/js/common-components.js"></script>
    <script src="/assets/js/secundaria.js"></script>


</body>
</html>
