<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Metadatos de la página -->
    <title>Lecturas de Vuelo: Maravia</title> <!-- Título de la página que aparece en la pestaña del navegador -->
    <meta charset="utf-8"> <!-- Define la codificación de caracteres para la página -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configura la vista para dispositivos móviles -->
    <link rel="stylesheet" href="../../assets/css/base.css">
    <link rel="stylesheet" href="../../assets/css/layout.css">
    <link rel="stylesheet" href="../../assets/css/tiles.css">
</head>

<body>
    <div class="secundaria-container">
        <!-- Header móvil -->
        <div id="mobileHeaderContainer" data-include="/includes/mobile-header.html"></div>

        <!-- Sidebar escritorio -->
        <div id="sidebarContainer" data-include="/includes/desktop-sidebar.html"></div>
    <!-- callout para resumir la sección -->
    <div class="callout">
        <p> Generador de palabras aleatorias.
        <br> Introduce un número del 1 al 5 para generar una palabra aleatoria con esa cantidad de letras.
        </p>
    </div>

    <!-- Contenido principal de la página -->
    <main>
        <br>
        <div>
            <label for="num-letras">Número de letras (1-5):</label>
            <input type="number" id="num-letras" min="1" max="5" value="3">
            <button id="generar-btn">Enviar</button>
        </div>
        <br>
        <div id="resultado"></div>
    </main>

    <!-- Scripts para la funcionalidad del menú, el tema y el juego -->
    <script>
        /* Menú hamburguesa: alterna la visibilidad del menú de enlaces en móvil */
        document.querySelector('.menu-toggle').addEventListener('click', function() {
            document.querySelector('.menu-principal ul').classList.toggle('active');
        });

        /* Botón de tema (día/noche): alterna entre modo claro y oscuro */
        const themeToggle = document.getElementById('theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                /* Cambiar el emoji del botón según el estado del tema */
                const isDark = document.body.classList.contains('dark-mode');
                this.querySelector('span').textContent = isDark ? '☀️' : '🌙';
                /* Actualizar el estado aria-pressed para accesibilidad */
                this.setAttribute('aria-pressed', isDark);
            });
        }

        /* Funcionalidad del juego Maravia */
        const generarBtn = document.getElementById('generar-btn');
        const numLetrasInput = document.getElementById('num-letras');
        const resultadoDiv = document.getElementById('resultado');

        // Vocales y consonantes para generar palabras aleatorias
        const vocales = ['A', 'E', 'I', 'O', 'U'];
        const consonantes = ['B', 'C', 'D', 'F', 'G', 'H', 'J', 'K', 'L', 'M', 'N', 'P', 'Q', 'R', 'S', 'T', 'V', 'W', 'X', 'Y', 'Z'];

        // Función para generar una letra aleatoria (alternando vocales y consonantes para mejor pronunciación)
        function generarLetraAleatoria(esVocal) {
            if (esVocal) {
                return vocales[Math.floor(Math.random() * vocales.length)];
            } else {
                return consonantes[Math.floor(Math.random() * consonantes.length)];
            }
        }

        // Función para generar una palabra aleatoria con n letras
        function generarPalabraAleatoria(n) {
            let palabra = '';
            // Alternar entre consonantes y vocales para que suene más natural
            for (let i = 0; i < n; i++) {
                // Si es la primera letra, que sea consonante (para que suene mejor)
                const esVocal = (i % 2 === 1); // Alternar: consonante, vocal, consonante, vocal...
                palabra += generarLetraAleatoria(esVocal);
            }
            return palabra;
        }

        // Evento al hacer clic en el botón "Enviar"
        generarBtn.addEventListener('click', function() {
            const numLetras = parseInt(numLetrasInput.value);
            
            // Validar que el número esté entre 1 y 5
            if (isNaN(numLetras) || numLetras < 1 || numLetras > 5) {
                resultadoDiv.textContent = 'Por favor, introduce un número válido entre 1 y 5.';
                resultadoDiv.style.color = 'red';
                return;
            }

            // Generar la palabra aleatoria
            const palabraGenerada = generarPalabraAleatoria(numLetras);
            resultadoDiv.textContent = `Palabra generada: ${palabraGenerada}`;
            resultadoDiv.style.color = 'black';
        });
    </script>
    <!-- Script para cargar componentes comunes -->
    <script src="/assets/js/common-components.js"></script>
</body>
</html>
