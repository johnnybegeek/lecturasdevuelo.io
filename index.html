<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Metadatos de la página -->
    <title>Lecturas de Vuelo</title> <!-- Título de la página que aparece en la pestaña del navegador -->
    <meta charset="utf-8"> <!-- Define la codificación de caracteres para la página -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configura la vista para dispositivos móviles -->
    <link rel="stylesheet" href="assets/css/estilo.css"> <!-- Enlace al archivo de estilos CSS -->
    <script src="assets/js/constantes.js"></script>
</head>
<body>
    <!-- Cabecera con logotipo y título -->
    <div class="logo-header">
        <a href="/index.html" class="img-link"><img src="assets/images/logoblog.avif" alt="Logotipo de Lecturas de Vuelo" class="logo-img"></a> <!-- Logotipo del sitio -->
        <h1>Lecturas de Vuelo</h1> <!-- Título principal del sitio -->
    </div>
    <p>Artículos a baja altitud</p> <!-- Eslogan o descripción del sitio -->

    <!-- Barra de navegación superior fija -->
    <header class="header-fijo">
        <nav class="menu-principal">
            <!-- Lista de enlaces de navegación (se oculta en móvil) -->
            <ul>
                <li><a href="/sections/departures/departures.html">Departures</a></li>
                <li><a href="/sections/arrivals/arrivals.html">Arrivals</a></li>
                <li><a href="/sections/navdata/navdata.html">NavData</a></li>
                <li><a href="/sections/hub/hub.html">Hub</a></li>
                <li><a href="/sections/who/who.html">Who</a></li>
            </ul>
            <!-- Botones de control: tema y menú hamburguesa (siempre visibles) -->
            <button id="theme-toggle" aria-label="Alternar entre modo día y noche" aria-pressed="false"><span aria-hidden="true">🌙</span></button>
            <button class="menu-toggle" aria-label="Abrir menú">☰</button>
        </nav>
    </header>

    <!-- Contenido principal de la página -->
    <main>

        <h2><a href="/sections/departures/departures.html">Departures</a></h2> <!-- Sección de bitácora y ideas breves gestándose -->
        <p data-text-key="departures"></p>

        <h2><a href="/sections/arrivals/arrivals.html">Arrivals</a></h2> <!-- Sección de archivo -->
        <p data-text-key="arrivals"></p>

        <h2><a href="/sections/navdata/navdata.html">NavData</a></h2> <!-- Sección de recursos -->
        <p data-text-key="navdata"></p>

        <h2><a href="/sections/hub/hub.html">Hub</a></h2> <!-- Sección de Áreas -->
        <p data-text-key="hub"></p>

        <h2><a href="/sections/who/who.html">Who</a></h2> <!-- Sección de proyectos en marcha -->
        <p data-text-key="who"></p>

        <br> <!-- Salto de línea para espacio -->
    </main>

    <!-- Scripts para la funcionalidad del menú y el tema -->
    <script>
        /* Menú hamburguesa: alterna la visibilidad del menú de enlaces en móvil */
        document.querySelector('.menu-toggle').addEventListener('click', function() {
            document.querySelector('nav.menu-principal ul').classList.toggle('active');
        });

        /* Botón de tema (día/noche): alterna entre modo claro y oscuro */
        const themeToggle = document.getElementById('theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                /* Cambiar el emoji del botón según el estado del tema */
                const isDark = document.body.classList.contains('dark-mode');
                this.querySelector('span').textContent = isDark ? '☀️' : '🌙';
                /* Actualizar el estado aria-pressed para accesibilidad */
                this.setAttribute('aria-pressed', isDark);
            });
        }
    </script>
</body>
</html>
