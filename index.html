<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturas de Vuelo</title>
    <meta name="description" content="Lecturas de Vuelo - Blog de Humanidades, Game Design y Game studies y juegos de mesa">
    <link rel="stylesheet" href="assets/css/estilo.css">
</head>
<body>
    <main class="carousel" id="carousel" role="main" aria-label="Menú principal">
        <!-- H1 oculto visualmente pero presente para SEO y lectores de pantalla -->
    <h1 class="visually-hidden">Lecturas de Vuelo - Blog de Humanidades, Game Design y Game studies y juegos de mesa</h1>
        
        <section class="section" id="s1" aria-label="Sección 1">
            <a href="/temas/" class="tile bg-blue white-text" aria-label="Ir a Temas">
                <span class="tile-text">Temas</span>
            </a>
            <a href="/archivo/" class="tile bg-green" aria-label="Ir a Archivo">
                <span class="tile-text">Archivo</span>
            </a>
        </section>

        <section class="section" id="s2" aria-label="Sección 2">
            <a href="/who/" class="tile bg-transparent" aria-label="Ir a Sobre mí">
                <img src="assets/images/logoblog.avif" alt="Logotipo de Lecturas de Vuelo" class="logo-placeholder">
            </a>
            <a href="/blog/" class="tile bg-orange" aria-label="Ir a blog destacado">
                <span class="badge">Destacada</span>
                <span class="tile-text">blog</span>
            </a>
        </section>

        <section class="section" id="s3" aria-label="Sección 3">
            <a href="/juegos/" class="tile bg-purple white-text" aria-label="Ir a Juegos">
                <span class="tile-text">Juegos</span>
            </a>
            <a href="/recursos/" class="tile bg-teal" aria-label="Ir a Recursos">
                <span class="tile-text">Recursos</span>
            </a>
        </section>

    </main>

    <script src="assets/js/app.js"></script>
</body>
</html>
